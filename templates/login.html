{% extends "base.html" %}

{% block title %}Login - TaskFlow{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card fade-in">
        <div class="auth-logo">
            <i class="fas fa-sign-in-alt"></i>
            <h1>Bem-vindo de volta</h1>
            <p style="color: var(--text-secondary); margin-top: 8px;">
                Faça login para continuar
            </p>
        </div>
        
        <form method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" 
                       placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" class="form-control" id="senha" name="senha" 
                       placeholder="Sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 14px;">
                <i class="fas fa-sign-in-alt"></i>
                Entrar
            </button>
        </form>
        
        <p style="margin-top: 24px; text-align: center; color: var(--text-secondary);">
            Não tem uma conta? 
            <a href="{{ url_for('registro') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">
                Crie uma agora
            </a>
        </p>
    </div>
</div>
{% endblock %}
